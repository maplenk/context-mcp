version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - prealloc

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new: true
