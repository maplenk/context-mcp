run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell

linters-settings:
  errcheck:
    exclude-functions:
      - (*database/sql.Tx).Rollback
      - (*github.com/naman/qb-context/internal/watcher.Watcher).Stop
  gocritic:
    enabled-tags:
      - diagnostic
      - style
  gosec:
    excludes:
      - G104

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
