name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"

      - name: Build sanity check
        run: go build -tags "fts5" ./...

      - name: Test release build
        run: go test -tags "fts5" ./... -count=1

      - name: Release artifacts
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release manifest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          version = release_tag.removeprefix("v")
          checksum_path = Path("dist/context-mcp-checksums.txt")
          archive_name = "context-mcp-darwin-arm64.tar.gz"

          checksum = None
          for line in checksum_path.read_text().splitlines():
              line = line.strip()
              if not line:
                  continue
              parts = line.split()
              if len(parts) >= 2 and parts[-1] == archive_name:
                  checksum = parts[0]
                  break
          if checksum is None:
              raise SystemExit(f"checksum for {archive_name} not found in {checksum_path}")

          manifest = json.loads(Path("server.json").read_text())
          manifest["version"] = version
          manifest["packages"][0]["identifier"] = (
              f"https://github.com/maplenk/context-mcp/releases/download/{release_tag}/{archive_name}"
          )
          manifest["packages"][0]["fileSha256"] = checksum

          output_path = Path("dist/server.json")
          output_path.write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Generate release installer
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          version = release_tag.removeprefix("v")
          archive_name = "context-mcp-darwin-arm64.tar.gz"
          archive_url = (
              f"https://github.com/maplenk/context-mcp/releases/download/{release_tag}/{archive_name}"
          )
          checksum_path = Path("dist/context-mcp-checksums.txt")

          checksum = None
          for line in checksum_path.read_text().splitlines():
              line = line.strip()
              if not line:
                  continue
              parts = line.split()
              if len(parts) >= 2 and parts[-1] == archive_name:
                  checksum = parts[0]
                  break
          if checksum is None:
              raise SystemExit(f"checksum for {archive_name} not found in {checksum_path}")

          template = Path("scripts/install.sh").read_text()
          rendered = (
              template.replace("__VERSION__", version)
              .replace("__ARCHIVE_URL__", archive_url)
              .replace("__ARCHIVE_SHA256__", checksum)
          )

          output_path = Path("dist/install.sh")
          output_path.write_text(rendered)
          output_path.chmod(0o755)
          PY

      - name: Smoke test release installer
        run: |
          python3 -m http.server 18080 -d dist >/tmp/context-mcp-release-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          for i in 1 2 3 4 5; do
            curl -sf http://127.0.0.1:18080/ >/dev/null 2>&1 && break
            sleep 1
          done

          install_dir="$RUNNER_TEMP/context-mcp-bin"
          CONTEXT_MCP_BASE_URL="http://127.0.0.1:18080" \
            sh dist/install.sh --dir "$install_dir"

          test -x "$install_dir/context-mcp"
          "$install_dir/context-mcp" --help >/dev/null 2>&1 || true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release upload "$RELEASE_TAG" dist/server.json dist/install.sh --clobber
