name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -tags "fts5" ./...

      - name: Vet
        run: go vet -tags "fts5" ./...

      - name: Test with race detector
        run: go test -tags "fts5" -race -count=1 ./...
